<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Flappy Dragon</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

  *, *::before, *::after { box-sizing: border-box; }

  html, body {
    margin: 0; padding: 0;
    width: 100%; height: 100%;
    background: #0d0d10;
    overflow: hidden;
    /* кросс-браузер: убираем выделение текста при кликах */
    -webkit-user-select: none;
    -moz-user-select: none;
    user-select: none;
    /* отключаем tap-highlight на мобилках */
    -webkit-tap-highlight-color: transparent;
  }

  /* Обёртка центрирует canvas в любом окне */
  #fb-wrapper {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    display: -webkit-box;
    display: -ms-flexbox;
    display: flex;
    -webkit-box-orient: vertical;
    -webkit-box-direction: normal;
    -ms-flex-direction: column;
    flex-direction: column;
    -webkit-box-align: center;
    -ms-flex-align: center;
    align-items: center;
    -webkit-box-pack: center;
    -ms-flex-pack: center;
    justify-content: center;
    gap: 0;
  }

  #fb-score-display {
    font-family: 'Press Start 2P', 'Courier New', Courier, monospace;
    color: #e8e8f0;
    letter-spacing: 2px;
    /* размер шрифта подстраивается под ширину канваса через JS */
    margin-bottom: 6px;
    white-space: nowrap;
  }

  #fb-canvas {
    display: block;
    cursor: pointer;
    touch-action: none;
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.10);
    /* масштаб выставляется через JS, но CSS не мешает */
    image-rendering: -webkit-optimize-contrast; /* Safari */
    image-rendering: crisp-edges;               /* FF */
    image-rendering: pixelated;                 /* Chrome */
  }

  #fb-bottom {
    display: -webkit-box;
    display: -ms-flexbox;
    display: flex;
    -webkit-box-orient: horizontal;
    -webkit-box-direction: normal;
    -ms-flex-direction: row;
    flex-direction: row;
    gap: 16px;
    margin-top: 6px;
    -webkit-box-align: center;
    -ms-flex-align: center;
    align-items: center;
  }

  #fb-best {
    font-family: 'Press Start 2P', 'Courier New', Courier, monospace;
    color: #888;
    white-space: nowrap;
  }

  #fb-mute-btn {
    font-size: 18px;
    cursor: pointer;
    opacity: 0.65;
    -webkit-transition: opacity .2s;
    transition: opacity .2s;
    background: none;
    border: none;
    padding: 0;
    line-height: 1;
  }
  #fb-mute-btn:hover { opacity: 1; }
</style>
</head>
<body>
<div id="fb-wrapper">
  <div id="fb-score-display">СЧЁТ: <span id="fb-score">0</span></div>
  <canvas id="fb-canvas" width="360" height="540"></canvas>
  <div id="fb-bottom">
    <div id="fb-best">РЕКОРД: <span id="fb-best-val">0</span></div>
    <button id="fb-mute-btn" title="Звук вкл/выкл">🔊</button>
  </div>
</div>

<script>
(function(){
  const canvas  = document.getElementById('fb-canvas');
  const ctx     = canvas.getContext('2d');
  const scoreEl = document.getElementById('fb-score');
  const bestEl  = document.getElementById('fb-best-val');

  // ── ЛОГИЧЕСКИЕ размеры (не меняются) ──────────────────────
  const W=360, H=540;

  // ── АДАПТИВНЫЙ МАСШТАБ ────────────────────────────────────
  // Canvas всегда 360×540 логически, но CSS-трансформ растягивает
  // его под реальное окно. Работает в Chrome, Safari, Firefox, Edge.
  function resizeCanvas(){
    const vw = window.innerWidth;
    const vh = window.innerHeight;
    // Резервируем место для строки счёта (~28px) и строки рекорда (~28px)
    const uiH = 60;
    const scaleX = vw / W;
    const scaleY = (vh - uiH) / H;
    const scale  = Math.min(scaleX, scaleY);
    const cw = Math.round(W * scale);
    const ch = Math.round(H * scale);
    canvas.style.width  = cw + 'px';
    canvas.style.height = ch + 'px';
    // Шрифт UI пропорционален масштабу
    const fs = Math.max(8, Math.round(13 * scale));
    document.getElementById('fb-score-display').style.fontSize = fs + 'px';
    document.getElementById('fb-best').style.fontSize = Math.max(6, Math.round(9 * scale)) + 'px';
  }
  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);
  // Safari на iOS иногда меняет размер после поворота с задержкой
  window.addEventListener('orientationchange', function(){ setTimeout(resizeCanvas, 120); });
  const PIPE_W=52, GROUND_H=60;
  const DRAGON_X=80;

  // ── ПЛАВНАЯ ФИЗИКА ──────────────────────────────────────────
  const JUMP=-7.2;
  const GRAV_UP=0.22;
  const GRAV_DOWN=0.38;
  const GRAV_PEAK=0.10;
  const PEAK_ZONE=1.8;
  const MAX_FALL=7.5;
  const ANGLE_SPEED=0.08;
  const COYOTE_FRAMES=6, JUMP_BUFFER_FRAMES=8;

  // ── СИСТЕМА ПРОГРЕССИИ УРОВНЕЙ ──────────────────────────────
  // Уровень 1 = победить за 30 очков, уровень 2 = 40, уровень 3 = 50, ...
  // Сложность нарастает постепенно с каждым уровнем
  let currentLevel = parseInt(localStorage.getItem('fb_level')||'1');

  function winScoreForLevel(lvl){
    return 30 + (lvl - 1) * 10; // 30, 40, 50, 60, ...
  }

  function diffParamsForLevel(lvl){
    // Уровень 1 — самый лёгкий. Каждый уровень чуть сложнее.
    // gap уменьшается, speed растёт, интервал уменьшается
    const gap      = Math.max(105, 185 - (lvl - 1) * 10);
    const speed    = Math.min(4.2,  1.7 + (lvl - 1) * 0.22);
    const interval = Math.max(62,   115 - (lvl - 1) * 5);
    return { gap, speed, interval };
  }

  let WIN_SCORE = winScoreForLevel(currentLevel);
  let currentDiff = diffParamsForLevel(currentLevel);

  // Устаревшие переменные (оставляем пустыми чтобы не ломать остальной код)
  let diffLevel = 0;
  let diffNotifyText = '', diffNotifyAlpha = 0;
  function applyDifficulty(){} // no-op, заменено прогрессией

  // ── ФИНАЛ НА 30 ОЧКАХ ───────────────────────────────────────
  // Три варианта финала — раскомментируй нужный в FINALE_MODE:
  // 'freedom'  — дракон вырывается на свободу, небо светлеет
  // 'gates'    — золотые врата открываются, вспышка победы
  // 'breakout' — дракон пробивает стену труб огнём
  const FINALE_MODE = 'freedom';

  let finaleState = 'none'; // 'none' / 'approach' / 'burst' / 'fly'
  let finaleT = 0;          // таймер финала
  let finalePipe = null;    // последняя труба-финал
  let finaleFlash = 0;      // вспышка экрана
  let finaleTextAlpha = 0;
  let dragonFlyX = 0, dragonFlyY = 0, dragonFlyAngle = 0; // для финального полёта

  // ── TIME & SEASON ──────────────────────────────────────────
  let globalT=0;
  const DAY_LEN=3600, SEASON_LEN=10800;
  const SEASONS=['🌸 ВЕСНА','☀️ ЛЕТО','🍂 ОСЕНЬ','❄️ ЗИМА'];
  const TIMES=['НОЧЬ','РАССВЕТ','ДЕНЬ','ЗАКАТ'];
  const SKY_STOPS_TOP=['#020210','#1a0535','#f07030','#1a6aba','#f07030','#1a0535','#020210'];
  const SKY_STOPS_BOT=['#05050f','#2d1040','#ff9060','#60b0ff','#ff9060','#2d1040','#05050f'];

  function timeOfDay(t){ return (t%DAY_LEN)/DAY_LEN; }
  function seasonIdx(t){ return Math.floor((t%(SEASON_LEN*4))/SEASON_LEN); }

  function lerpColor(a,b,t){
    const ai=[parseInt(a.slice(1,3),16),parseInt(a.slice(3,5),16),parseInt(a.slice(5,7),16)];
    const bi=[parseInt(b.slice(1,3),16),parseInt(b.slice(3,5),16),parseInt(b.slice(5,7),16)];
    return '#'+ai.map((v,i)=>Math.round(v+(bi[i]-v)*t).toString(16).padStart(2,'0')).join('');
  }
  function lerpColors(stops,t){
    t=Math.max(0,Math.min(1,t));
    const seg=1/(stops.length-1);
    const i=Math.min(Math.floor(t/seg),stops.length-2);
    return lerpColor(stops[i],stops[i+1],(t-i*seg)/seg);
  }

  function getSkyColors(tod){
    // Во время финала небо светлеет к белому/золотому
    if(finaleState==='burst'||finaleState==='fly'){
      const ft=Math.min(1,finaleT/120);
      const top=lerpColor(lerpColors(SKY_STOPS_TOP,tod),'#fff8e0',ft*0.8);
      const bot=lerpColor(lerpColors(SKY_STOPS_BOT,tod),'#ffe080',ft*0.7);
      return {top,bot};
    }
    return { top:lerpColors(SKY_STOPS_TOP,tod), bot:lerpColors(SKY_STOPS_BOT,tod) };
  }
  function getSunPos(tod){
    const angle=(tod-0.25)*Math.PI/0.5;
    const x=W*(tod-0.1)/0.8;
    const y=H*0.55-Math.sin(Math.max(0,Math.min(Math.PI,angle)))*(H*0.55);
    return {x,y,visible:tod>0.18&&tod<0.82};
  }
  function getMoonPos(tod){
    const nightT=tod<0.5?(tod+0.5)%1:tod-0.5;
    const x=W*(0.1+nightT*0.8);
    const y=H*0.3-Math.sin(Math.max(0,Math.min(Math.PI,nightT*2*Math.PI-Math.PI*0.5+Math.PI*0.5)))*H*0.25;
    return {x,y:Math.max(20,y),visible:tod<0.15||tod>0.85};
  }

  function getPipeColors(tod,season){
    const isNight=tod<0.2||tod>0.8;
    const isDusk=(tod>0.7&&tod<0.85)||(tod>0.15&&tod<0.3);
    const palettes=[
      {fill:'#2d6e4e',stroke:'#5dbb8a'},{fill:'#1a5c1a',stroke:'#4daa3a'},
      {fill:'#7a3a00',stroke:'#e08030'},{fill:'#1a3a6e',stroke:'#60a0e8'},
    ];
    let p={...palettes[season]};
    if(isNight){ p.fill=lerpColor(p.fill,'#0a0a18',0.5); p.stroke=lerpColor(p.stroke,'#3050a0',0.3); }
    else if(isDusk){ p.fill=lerpColor(p.fill,'#8b2200',0.3); p.stroke=lerpColor(p.stroke,'#ffaa50',0.4); }
    // Финальная труба — золотая
    return p;
  }
  function getGroundColors(tod,season){
    const palettes=[
      ['#2d5a20','#4a8a30','#3d7228'],['#1a4a10','#3a8020','#2a6018'],
      ['#6a3800','#a05c10','#7a4808'],['#d8e8f8','#eef4ff','#c8d8f0'],
    ];
    const [g1,g2,g3]=palettes[season];
    const isNight=tod<0.2||tod>0.8;
    if(isNight) return [lerpColor(g1,'#050510',0.5),lerpColor(g2,'#050510',0.4),lerpColor(g3,'#050510',0.5)];
    return [g1,g2,g3];
  }

  // ── GAME STATE ─────────────────────────────────────────────
  let state,bird,pipes,score,best,frames;
  let wingFlap=0, fireParticles=[], lastSeason=-1;
  let coyoteTimer=0, jumpBuffer=0;
  let jumpSmooth=0;
  let deathLockTimer=0; // блокировка клика 3 сек после смерти (180 кадров @ 60fps)

  // ══════════════════════════════════════════════════════════
  // ── ЗВУКОВОЙ ДВИЖОК (Web Audio API, без внешних файлов) ───
  // ══════════════════════════════════════════════════════════
  let audioCtx = null;
  let masterGain = null;
  let windNode = null, windGain = null;
  let soundEnabled = true;

  function getAudio(){
    if(!audioCtx){
      audioCtx = new (window.AudioContext||window.webkitAudioContext)();
      masterGain = audioCtx.createGain();
      masterGain.gain.value = 0.7;
      masterGain.connect(audioCtx.destination);
    }
    if(audioCtx.state==='suspended') audioCtx.resume();
    return audioCtx;
  }

  function playTone(freq, type, startVol, endVol, duration, startTime, dest){
    const ac = getAudio();
    const t = startTime || ac.currentTime;
    const osc = ac.createOscillator();
    const gain = ac.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, t);
    gain.gain.setValueAtTime(startVol, t);
    gain.gain.exponentialRampToValueAtTime(Math.max(0.001, endVol), t + duration);
    osc.connect(gain);
    gain.connect(dest || masterGain);
    osc.start(t); osc.stop(t + duration + 0.02);
  }

  function playNoise(color, startVol, endVol, duration, startTime, dest, filterFreq, filterType){
    const ac = getAudio();
    const t = startTime || ac.currentTime;
    const bufSize = Math.floor(ac.sampleRate * Math.min(duration + 0.1, 2));
    const buf = ac.createBuffer(1, bufSize, ac.sampleRate);
    const data = buf.getChannelData(0);
    if(color === 'pink'){
      let b0=0,b1=0,b2=0,b3=0,b4=0,b5=0,b6=0;
      for(let i=0;i<bufSize;i++){
        const w=Math.random()*2-1;
        b0=0.99886*b0+w*0.0555179; b1=0.99332*b1+w*0.0750759;
        b2=0.96900*b2+w*0.1538520; b3=0.86650*b3+w*0.3104856;
        b4=0.55000*b4+w*0.5329522; b5=-0.7616*b5-w*0.0168980;
        data[i]=(b0+b1+b2+b3+b4+b5+b6+w*0.5362)*0.11; b6=w*0.115926;
      }
    } else {
      for(let i=0;i<bufSize;i++) data[i]=Math.random()*2-1;
    }
    const src = ac.createBufferSource();
    src.buffer = buf;
    const gain = ac.createGain();
    gain.gain.setValueAtTime(startVol, t);
    gain.gain.exponentialRampToValueAtTime(Math.max(0.001, endVol), t + duration);
    if(filterFreq){
      const flt = ac.createBiquadFilter();
      flt.type = filterType || 'bandpass'; flt.frequency.value = filterFreq; flt.Q.value = 1.2;
      src.connect(flt); flt.connect(gain);
    } else { src.connect(gain); }
    gain.connect(dest || masterGain);
    src.start(t); src.stop(t + duration + 0.05);
  }

  // 1. ПРЫЖОК — хлопок крыльев + свист подъёма
  function sndJump(){
    if(!soundEnabled) return;
    const ac = getAudio(); const t = ac.currentTime;
    playTone(90, 'sine', 0.50, 0.001, 0.12, t);
    playTone(55, 'triangle', 0.35, 0.001, 0.18, t);
    playNoise('pink', 0.15, 0.001, 0.14, t, null, 800, 'bandpass');
    // Свист подъёма
    const osc = ac.createOscillator(); const g = ac.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(300, t+0.02);
    osc.frequency.linearRampToValueAtTime(500, t+0.14);
    g.gain.setValueAtTime(0.07, t+0.02);
    g.gain.exponentialRampToValueAtTime(0.001, t+0.16);
    osc.connect(g); g.connect(masterGain);
    osc.start(t+0.02); osc.stop(t+0.18);
  }

  // 2. ОЧКО — чистый пинг, тон растёт с очками
  function sndScore(n){
    if(!soundEnabled) return;
    const ac = getAudio(); const t = ac.currentTime;
    const base = 660 + Math.min(Math.floor(n/5)*70, 350);
    playTone(base, 'sine', 0.20, 0.001, 0.18, t);
    playTone(base*1.25, 'sine', 0.08, 0.001, 0.14, t+0.06);
    playTone(base*3.0, 'triangle', 0.04, 0.001, 0.10, t);
  }

  // 3. СМЕРТЬ — удар + рокот + падающий стон
  function sndDeath(){
    if(!soundEnabled) return;
    const ac = getAudio(); const t = ac.currentTime;
    playTone(180, 'sawtooth', 0.55, 0.001, 0.25, t);
    playTone(90,  'sine',     0.65, 0.001, 0.30, t);
    playNoise('white', 0.45, 0.001, 0.35, t, null, 300, 'lowpass');
    const osc = ac.createOscillator(); const g = ac.createGain();
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(250, t+0.05);
    osc.frequency.exponentialRampToValueAtTime(55, t+0.55);
    g.gain.setValueAtTime(0.28, t+0.05);
    g.gain.exponentialRampToValueAtTime(0.001, t+0.6);
    osc.connect(g); g.connect(masterGain);
    osc.start(t+0.05); osc.stop(t+0.65);
    playNoise('pink', 0.28, 0.001, 0.5, t+0.08, null, 120, 'lowpass');
  }

  // 4. МИЛЕСТОУН — восходящий аккорд, свой для каждого
  const MILESTONE_CHORDS = {
    1:  [440, 554, 659],
    5:  [494, 622, 740, 988],
    10: [523, 659, 784, 1047],
    20: [587, 740, 880, 1175, 1568],
  };
  function sndMilestone(n){
    if(!soundEnabled) return;
    const ac = getAudio(); const t = ac.currentTime;
    const notes = MILESTONE_CHORDS[n] || [660, 880];
    notes.forEach((freq, i) => {
      playTone(freq, 'sine', 0.20, 0.001, 0.45, t + i*0.07);
      playTone(freq*2, 'sine', 0.04, 0.001, 0.25, t + i*0.07);
    });
    playTone(2200, 'sine', 0.07, 0.001, 0.3, t + notes.length*0.07);
  }

  // 5. СТАРТ — рёв дракона с вибрато
  function sndStart(){
    if(!soundEnabled) return;
    const ac = getAudio(); const t = ac.currentTime;
    const osc = ac.createOscillator();
    const lfo = ac.createOscillator();
    const lfoG = ac.createGain();
    const g = ac.createGain();
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(110, t);
    osc.frequency.linearRampToValueAtTime(190, t+0.25);
    lfo.type = 'sine'; lfo.frequency.value = 9; lfoG.gain.value = 14;
    lfo.connect(lfoG); lfoG.connect(osc.frequency);
    g.gain.setValueAtTime(0.001, t);
    g.gain.linearRampToValueAtTime(0.32, t+0.08);
    g.gain.exponentialRampToValueAtTime(0.001, t+0.38);
    osc.connect(g); g.connect(masterGain);
    osc.start(t); osc.stop(t+0.42);
    lfo.start(t); lfo.stop(t+0.42);
    playNoise('pink', 0.18, 0.001, 0.15, t+0.04, null, 600, 'bandpass');
  }

  // 6. ФИНАЛЬНАЯ ВСПЫШКА — эпический crescendo
  let finaleSndDone = false;
  function sndFinaleBurst(){
    if(!soundEnabled || finaleSndDone) return;
    finaleSndDone = true;
    const ac = getAudio(); const t = ac.currentTime;
    [130,165,196,262,330,392,523,659,784,1047].forEach((f,i)=>{
      playTone(f, 'sine', 0.10, 0.001, 1.2+i*0.04, t+i*0.02);
    });
    playNoise('pink', 0.55, 0.001, 0.4, t, null, 2000, 'lowpass');
    // Фанфара
    [523,659,784,659,784,1047].forEach((f,i)=>playTone(f,'square',0.13,0.001,0.22,t+0.35+i*0.12));
  }

  // 7. ПОБЕДНАЯ МЕЛОДИЯ
  let victorySndDone = false;
  function sndVictory(){
    if(!soundEnabled || victorySndDone) return;
    victorySndDone = true;
    const ac = getAudio(); const t = ac.currentTime;
    const melody=[523,659,784,1047,784,880,1047];
    const durs  =[0.18,0.18,0.18,0.36,0.18,0.18,0.5];
    let dt=0;
    melody.forEach((f,i)=>{
      playTone(f, 'sine', 0.26, 0.001, durs[i]*0.9, t+dt);
      playTone(f/2, 'triangle', 0.09, 0.001, durs[i]*0.9, t+dt);
      dt+=durs[i];
    });
    [2093,2637,3136].forEach((f,i)=>playTone(f,'sine',0.07,0.001,0.6,t+0.55+i*0.15));
  }

  // 8. ФОНОВЫЙ ВЕТЕР — постоянный амбиент
  function startWind(){
    if(!soundEnabled || windNode) return;
    const ac = getAudio();
    const bufSize = ac.sampleRate * 4;
    const buf = ac.createBuffer(1, bufSize, ac.sampleRate);
    const data = buf.getChannelData(0);
    let b0=0,b1=0,b2=0,b3=0,b4=0,b5=0,b6=0;
    for(let i=0;i<bufSize;i++){
      const w=Math.random()*2-1;
      b0=0.99886*b0+w*0.0555179; b1=0.99332*b1+w*0.0750759;
      b2=0.96900*b2+w*0.1538520; b3=0.86650*b3+w*0.3104856;
      b4=0.55000*b4+w*0.5329522; b5=-0.7616*b5-w*0.0168980;
      data[i]=(b0+b1+b2+b3+b4+b5+b6+w*0.5362)*0.11; b6=w*0.115926;
    }
    windNode = ac.createBufferSource();
    windNode.buffer = buf; windNode.loop = true;
    const flt = ac.createBiquadFilter();
    flt.type = 'bandpass'; flt.frequency.value = 380; flt.Q.value = 0.6;
    windGain = ac.createGain(); windGain.gain.value = 0;
    windNode.connect(flt); flt.connect(windGain); windGain.connect(masterGain);
    windNode.start();
  }

  function addPipe(){
    const minTop=70, maxTop=H-GROUND_H-currentDiff.gap-70;

    // Финальная труба (score==WIN_SCORE-1) — особая (isFinal)
    const isFinal = (score === WIN_SCORE - 1);
    const pipe = {x:W+PIPE_W, top:minTop+Math.random()*(maxTop-minTop), scored:false, isFinal};
    pipes.push(pipe);

  // ── HELPERS ────────────────────────────────────────────────
  function roundRect(x,y,w,h,radii){
    ctx.beginPath();
    ctx.moveTo(x+radii[0],y); ctx.lineTo(x+w-radii[1],y); ctx.quadraticCurveTo(x+w,y,x+w,y+radii[1]);
    ctx.lineTo(x+w,y+h-radii[2]); ctx.quadraticCurveTo(x+w,y+h,x+w-radii[2],y+h);
    ctx.lineTo(x+radii[3],y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-radii[3]);
    ctx.lineTo(x,y+radii[0]); ctx.quadraticCurveTo(x,y,x+radii[0],y); ctx.closePath();
  }

  // ── DRAW: SKY ──────────────────────────────────────────────
  function drawSky(){
    const tod=timeOfDay(globalT);
    const {top,bot}=getSkyColors(tod);
    const grad=ctx.createLinearGradient(0,0,0,H-GROUND_H);
    grad.addColorStop(0,top); grad.addColorStop(1,bot);
    ctx.fillStyle=grad; ctx.fillRect(0,0,W,H-GROUND_H);
  }

  // ── DRAW: STARS ────────────────────────────────────────────
  function drawStars(){
    const tod=timeOfDay(globalT);
    const alpha=tod<0.2?1-tod/0.2*0.3:tod>0.8?(tod-0.8)/0.2*0.7+0.3:tod<0.3?(0.3-tod)/0.1:tod>0.7?(tod-0.7)/0.1:0;
    if(alpha<=0) return;
    for(let s of stars){
      const tw=0.5+0.5*Math.sin(globalT*0.03+s.phase);
      ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(255,255,255,${alpha*tw*0.9})`; ctx.fill();
    }
  }

  // ── DRAW: SUN & MOON ───────────────────────────────────────
  function drawCelestial(){
    const tod=timeOfDay(globalT);
    const sun=getSunPos(tod);
    if(sun.visible){
      const brightness=Math.sin(Math.min(Math.PI,Math.max(0,(tod-0.2)/0.6*Math.PI)));
      // Во время финала солнце разгорается ярче
      const finaleBoost = (finaleState==='burst'||finaleState==='fly') ? Math.min(1,finaleT/80)*0.5 : 0;
      const glow=ctx.createRadialGradient(sun.x,sun.y,2,sun.x,sun.y,40+finaleBoost*60);
      glow.addColorStop(0,`rgba(255,240,160,${brightness*0.6+finaleBoost*0.4})`);
      glow.addColorStop(1,'rgba(255,200,80,0)');
      ctx.fillStyle=glow; ctx.beginPath(); ctx.arc(sun.x,sun.y,40+finaleBoost*60,0,Math.PI*2); ctx.fill();
      ctx.fillStyle=tod>0.65||tod<0.35?'#ff9944':'#fff8d0';
      ctx.beginPath(); ctx.arc(sun.x,sun.y,12+finaleBoost*8,0,Math.PI*2); ctx.fill();
    }
    const moon=getMoonPos(tod);
    if(moon.visible){
      ctx.fillStyle='#d8e0f8'; ctx.beginPath(); ctx.arc(moon.x,moon.y,10,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='rgba(0,0,0,0.1)';
      ctx.beginPath(); ctx.arc(moon.x+3,moon.y-2,3,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(moon.x-3,moon.y+3,2,0,Math.PI*2); ctx.fill();
    }
  }

  // ── DRAW: PARALLAX ─────────────────────────────────────────
  function drawParallax(){
    const tod=timeOfDay(globalT);
    const season=seasonIdx(globalT);
    const isNight=tod<0.2||tod>0.8;
    const mountainColors=[
      ['#3a6e4a','#2d5a3a'],['#2a5e2a','#1a4a1a'],
      ['#7a4a20','#5a3010'],['#5a7aaa','#3a5a8a'],
    ];
    const [mc1,mc2]=mountainColors[season];
    const speed1=state==='playing'||state==='finale'?frames*0.66:0;
    const speed2=state==='playing'||state==='finale'?frames*1.54:0;

    ctx.fillStyle=isNight?lerpColor(mc1,'#0a0a20',0.5):mc1;
    ctx.beginPath();
    for(let m of bgLayer1){
      const px=((m.x-speed1)%(W+120)+W+120)%(W+120)-60;
      ctx.moveTo(px,H-GROUND_H);
      ctx.quadraticCurveTo(px+m.w*0.5,H-GROUND_H-m.h,px+m.w,H-GROUND_H);
    }
    ctx.closePath(); ctx.fill();

    ctx.fillStyle=isNight?lerpColor(mc2,'#0a0a20',0.5):mc2;
    ctx.beginPath();
    for(let m of bgLayer2){
      const px=((m.x-speed2)%(W+100)+W+100)%(W+100)-50;
      ctx.moveTo(px,H-GROUND_H);
      ctx.quadraticCurveTo(px+m.w*0.5,H-GROUND_H-m.h,px+m.w,H-GROUND_H);
    }
    ctx.closePath(); ctx.fill();
  }

  // ── DRAW: PIPES ────────────────────────────────────────────
  function drawPipe(pipe){
    const {x, top, isFinal} = pipe;
    const tod=timeOfDay(globalT);
    const season=seasonIdx(globalT);
    let {fill,stroke}=getPipeColors(tod,season);

    // Финальная труба — золотая
    if(isFinal){
      fill = '#b8860b';
      stroke = '#ffd700';
    }

    const r=6,capH=18,capW=PIPE_W+10;
    ctx.lineWidth = isFinal ? 2.5 : 1.5;
    ctx.fillStyle=fill; ctx.strokeStyle=stroke;
    roundRect(x,0,PIPE_W,top,[0,0,r,r]); ctx.fill(); ctx.stroke();
    roundRect(x-5,top-capH,capW,capH,[0,0,r,r]); ctx.fill(); ctx.stroke();
    const bot=top+currentDiff.gap;
    roundRect(x,bot,PIPE_W,H-GROUND_H-bot,[r,r,0,0]); ctx.fill(); ctx.stroke();
    roundRect(x-5,bot,capW,capH,[r,r,0,0]); ctx.fill(); ctx.stroke();
    ctx.fillStyle='rgba(255,255,255,0.07)';
    ctx.fillRect(x+5,2,6,top-capH-4);
    ctx.fillRect(x+5,bot+capH+2,6,H-GROUND_H-bot-capH-4);
    if(season===3){
      ctx.fillStyle='rgba(180,220,255,0.9)';
      for(let ix=x-3;ix<x+PIPE_W+5;ix+=8){ ctx.beginPath(); ctx.moveTo(ix,top); ctx.lineTo(ix+2,top+10); ctx.lineTo(ix+4,top); ctx.closePath(); ctx.fill(); }
    }
    if(season===0){
      ctx.fillStyle= isFinal ? '#ffd700' : '#ffaacc';
      ctx.beginPath(); ctx.arc(x+PIPE_W/2,top-capH+5,4,0,Math.PI*2); ctx.fill();
    }

    // Для финальной трубы — золотое свечение
    if(isFinal){
      const gg=ctx.createLinearGradient(x,top,x,top+currentDiff.gap);
      gg.addColorStop(0,'rgba(255,215,0,0.08)'); gg.addColorStop(0.5,'rgba(255,215,0,0.18)'); gg.addColorStop(1,'rgba(255,215,0,0.08)');
      ctx.fillStyle=gg; ctx.fillRect(x-5,top,capW,currentDiff.gap);
    } else {
      const glowC=tod>0.4&&tod<0.6?'rgba(255,255,180,0.1)':'rgba(120,180,255,0.08)';
      const gg=ctx.createLinearGradient(x,top,x,top+currentDiff.gap);
      gg.addColorStop(0,glowC); gg.addColorStop(0.5,glowC.replace('0.1','0.18').replace('0.08','0.14')); gg.addColorStop(1,glowC);
      ctx.fillStyle=gg; ctx.fillRect(x-5,top,capW,currentDiff.gap);
    }
  }

    ctx.beginPath();ctx.moveTo(29,-13);ctx.lineTo(31,-20);ctx.lineTo(35,-13);ctx.closePath();ctx.fill();ctx.stroke();
    ctx.fillStyle='#ffcc00'; ctx.strokeStyle='#cc9900'; ctx.lineWidth=1.2;
    ctx.beginPath();ctx.moveTo(30,-14);ctx.bezierCurveTo(26,-22,16,-26,12,-22);ctx.bezierCurveTo(14,-18,20,-18,22,-14);ctx.closePath();ctx.fill();ctx.stroke();
    ctx.beginPath();ctx.moveTo(36,-15);ctx.bezierCurveTo(32,-24,22,-28,19,-23);ctx.bezierCurveTo(21,-19,27,-19,28,-15);ctx.closePath();ctx.fill();ctx.stroke();
    ctx.fillStyle='#9b0080'; ctx.strokeStyle='#6a005a'; ctx.lineWidth=0.8;
    ctx.beginPath();ctx.moveTo(26,-12);ctx.lineTo(20,-20);ctx.lineTo(24,-18);ctx.lineTo(22,-24);ctx.lineTo(27,-20);ctx.lineTo(26,-16);ctx.lineTo(30,-14);ctx.closePath();ctx.fill();ctx.stroke();

    // FIRE BREATH — во время финала всегда горит
    const isFlying = state==='finale'&&(finaleState==='burst'||finaleState==='fly');
    if((state==='playing'&&bird.vy<-1)||isFlying){
      const intensity = isFlying ? Math.min(1,finaleT/30) : Math.min(1,(-bird.vy)/6);
      const len=(15+intensity*28)*(isFlying?2.5:1);
      ctx.save();
      ctx.beginPath();
      ctx.moveTo(54,0); ctx.bezierCurveTo(60,-4,60+len*0.5,-6,54+len,-4);
      ctx.bezierCurveTo(58+len*0.7,0,60+len*0.4,5,54+len,4);
      ctx.bezierCurveTo(60+len*0.5,6,58,6,54,0);
      ctx.closePath();
      const fg=ctx.createLinearGradient(54,0,54+len,0);
      fg.addColorStop(0,'rgba(255,255,150,1)'); fg.addColorStop(0.3,'rgba(255,160,0,0.9)');
      fg.addColorStop(0.7,'rgba(255,40,0,0.7)'); fg.addColorStop(1,'rgba(200,10,0,0)');
      ctx.fillStyle=fg; ctx.fill();
      ctx.beginPath();
      ctx.moveTo(54,1); ctx.bezierCurveTo(58,-1,58+len*0.4,-2,54+len*0.8,-1);
      ctx.bezierCurveTo(58+len*0.3,1,56,3,54,3); ctx.closePath();
      ctx.fillStyle='rgba(255,255,220,0.9)'; ctx.fill();
      ctx.restore();
    }
    ctx.restore();
  }

  // ── DRAW: FINALE SEQUENCE ──────────────────────────────────
  function drawFinale(){
    if(finaleState==='none') return;

    if(finaleState==='approach'){
      // Финальная труба расступается — показываем надпись "последний барьер"
      const pulse = 0.7+0.3*Math.sin(finaleT*0.15);
      ctx.save();
      ctx.globalAlpha = pulse * 0.85;
      ctx.font='bold 9px "Press Start 2P",monospace';
      ctx.textAlign='center';
      ctx.fillStyle='#ffd700';
      ctx.shadowColor='#ff8800';
      ctx.shadowBlur=20;
      ctx.fillText('ПОСЛЕДНИЙ БАРЬЕР!',W/2,60);
      ctx.restore();
    }

    if(finaleState==='burst'){
      // Вспышка + дракон начинает лететь вперёд
      if(finaleFlash>0){
        ctx.save();
        ctx.globalAlpha=finaleFlash;
        ctx.fillStyle='#fff8d0';
        ctx.fillRect(0,0,W,H);
        ctx.restore();
        finaleFlash=Math.max(0,finaleFlash-0.04);
      }
      // Труба расступается (увеличиваем gap визуально)
      finaleTextAlpha = Math.min(1, finaleT/40);
      ctx.save();
      ctx.globalAlpha=finaleTextAlpha;
      ctx.font='bold 13px "Press Start 2P",monospace';
      ctx.textAlign='center';
      ctx.fillStyle='#ffd700';
      ctx.shadowColor='#ffaa00';
      ctx.shadowBlur=30;
      ctx.fillText('ПРОРВАЛСЯ!!! 🐉',W/2,H/2-80);
      ctx.restore();
    }

    if(finaleState==='fly'){
      // Дракон улетает вправо, текст "на свободу"
      const progress = Math.min(1, (finaleT-60)/180);

      // Затухающие трубы остаются позади
      finaleTextAlpha = Math.min(1, finaleT/30);
      ctx.save();
      ctx.globalAlpha=finaleTextAlpha;
      ctx.font='bold 12px "Press Start 2P",monospace';
      ctx.textAlign='center';
      ctx.fillStyle='#fff8a0';
      ctx.shadowColor='#ffcc00';
      ctx.shadowBlur=24;
      ctx.fillText('НА СВОБОДУ! 🌟',W/2,H/3-10);
      ctx.restore();

      // Подпись снизу
      if(finaleT > 80){
        const ta2 = Math.min(1,(finaleT-80)/40);
        ctx.save();
        ctx.globalAlpha=ta2*0.8;
        ctx.font='8px "Press Start 2P",monospace';
        ctx.textAlign='center';
        ctx.fillStyle='#e8e8f0';
        ctx.fillText('Лабиринт позади навсегда...',W/2,H/3+18);
        ctx.restore();
      }

      // Когда дракон почти улетел — экран победы
      if(progress >= 1){
        finaleState = 'done';
        state = 'victory';
      }
    }

    if(finaleState==='done' || state==='victory'){
      // Экран финальной победы
    }
  }

  // ── DRAW: DIFF NOTIFY ──────────────────────────────────────
  function drawDiffNotify(){
    if(diffNotifyAlpha<=0) return;
    ctx.save();
    ctx.globalAlpha=diffNotifyAlpha;
    ctx.font='bold 9px "Press Start 2P",monospace';
    ctx.textAlign='center';
    ctx.fillStyle = diffLevel<0 ? '#88ff88' : diffLevel===2 ? '#ff3333' : '#ff8844';
    ctx.shadowColor=ctx.fillStyle;
    ctx.shadowBlur=14;
    ctx.fillText(diffNotifyText, W/2, H/2-60);
    ctx.restore();
  }

  // ── DRAW: MILESTONE ────────────────────────────────────────
  function drawMilestone(){
    if(milestoneAlpha<=0) return;
    ctx.save();
    ctx.globalAlpha=milestoneAlpha;
    ctx.font='bold 13px "Press Start 2P",monospace';
    ctx.textAlign='center';
    ctx.fillStyle='#f5c842';
    ctx.shadowColor='#ff8800';
    ctx.shadowBlur=16;
    ctx.fillText(milestoneText,W/2,H/3);
    ctx.restore();
  }

  // ── DRAW: NARRATIVE ────────────────────────────────────────
  function drawNarrative(){
    if(narrativeAlpha<=0) return;
    ctx.save();
    ctx.globalAlpha=narrativeAlpha*0.85;
    ctx.font='8px "Press Start 2P",monospace';
    ctx.textAlign='center';
    ctx.fillStyle='#e8e8f0';
    ctx.shadowColor='rgba(0,0,0,0.8)';
    ctx.shadowBlur=8;
    ctx.fillText(NARRATIVE_LINES[narrativeIdx]||'',W/2,H-GROUND_H-20);
    ctx.restore();
  }

  // ── DRAW: UI ───────────────────────────────────────────────
  function drawUI(){
    if(state==='idle'){
      ctx.fillStyle='rgba(0,0,0,0.55)';
      roundRect(W/2-120,H/2-48,240,86,[12,12,12,12]); ctx.fill();
      ctx.strokeStyle='rgba(255,255,255,0.08)'; ctx.lineWidth=1;
      roundRect(W/2-120,H/2-48,240,86,[12,12,12,12]); ctx.stroke();
      ctx.fillStyle='#e8e8f0'; ctx.font='bold 13px "Press Start 2P",monospace'; ctx.textAlign='center';
      ctx.fillText('НАЖМИ ЧТОБЫ',W/2,H/2-18); ctx.fillText('НАЧАТЬ',W/2,H/2+6);
      // Цель уровня
      ctx.fillStyle='#ffcc55'; ctx.font='8px "Press Start 2P",monospace';
      ctx.fillText('УРОВЕНЬ '+currentLevel+' · ЦЕЛЬ: '+WIN_SCORE+' ОЧК.',W/2,H/2+28);
    }
    if(state==='dead'){
      // Считаем сколько не хватило
      const needed = WIN_SCORE - score;
      const pct = score / WIN_SCORE; // 0..1 прогресс

      ctx.fillStyle='rgba(0,0,0,0.72)';
      roundRect(W/2-140,H/2-88,280,168,[16,16,16,16]); ctx.fill();
      ctx.strokeStyle='rgba(160,130,255,0.22)'; ctx.lineWidth=1;
      roundRect(W/2-140,H/2-88,280,168,[16,16,16,16]); ctx.stroke();

      // Заголовок
      ctx.fillStyle='#c084fc'; ctx.font='bold 14px "Press Start 2P",monospace'; ctx.textAlign='center';
      ctx.shadowColor='rgba(180,100,255,0.5)'; ctx.shadowBlur=10;
      ctx.fillText('КОНЕЦ ИГРЫ',W/2,H/2-54);
      ctx.shadowBlur=0;

      // Счёт
      ctx.fillStyle='#e8e8f0'; ctx.font='10px "Press Start 2P",monospace';
      ctx.fillText('СЧЁТ: '+score+' / '+WIN_SCORE,W/2,H/2-24);

      // Прогресс-бар
      const barW=220, barH=8, barX=W/2-110, barY=H/2-8;
      ctx.fillStyle='rgba(255,255,255,0.08)';
      roundRect(barX,barY,barW,barH,[4,4,4,4]); ctx.fill();
      if(pct>0){
        const fillColor = pct<0.4?'#ff5555':pct<0.75?'#ffaa33':'#88ff88';
        ctx.fillStyle=fillColor;
        roundRect(barX,barY,Math.max(8,barW*pct),barH,[4,4,4,4]); ctx.fill();
      }

      // Мотивирующая надпись — зависит от того, сколько не хватило
      ctx.textAlign='center';
      if(needed <= 0){
        // не должно случиться, но на всякий случай
        ctx.fillStyle='#88ff88'; ctx.font='bold 9px "Press Start 2P",monospace';
        ctx.fillText('ПОЧТИ ДОШЁЛ!',W/2,H/2+14);
      } else if(needed === 1){
        ctx.fillStyle='#ff4488'; ctx.font='bold 9px "Press Start 2P",monospace';
        ctx.shadowColor='#ff0044'; ctx.shadowBlur=12;
        ctx.fillText('1 ОЧКО ДО ПОБЕДЫ!!!',W/2,H/2+14);
        ctx.shadowBlur=0;
      } else if(needed <= 3){
        ctx.fillStyle='#ff6644'; ctx.font='bold 9px "Press Start 2P",monospace';
        ctx.shadowColor='#ff4400'; ctx.shadowBlur=10;
        ctx.fillText('ЕЩЁ '+needed+' ОЧКА — И ТЫ ТАМ!',W/2,H/2+14);
        ctx.shadowBlur=0;
      } else if(needed <= 8){
        ctx.fillStyle='#ffaa33'; ctx.font='8px "Press Start 2P",monospace';
        ctx.fillText('ЧУТ-ЧУТЬ ОСТАЛОСЬ: '+needed+' ОЧК.',W/2,H/2+14);
      } else if(pct >= 0.6){
        ctx.fillStyle='#ffcc55'; ctx.font='8px "Press Start 2P",monospace';
        ctx.fillText('БОЛЬШЕ ПОЛОВИНЫ! +'+needed+' К ЦЕЛИ',W/2,H/2+14);
      } else {
        ctx.fillStyle='rgba(200,180,255,0.75)'; ctx.font='8px "Press Start 2P",monospace';
        ctx.fillText('ЦЕЛЬ: '+WIN_SCORE+' ОЧК. ТЫ ДОЙДЁШЬ!',W/2,H/2+14);
      }

      ctx.fillStyle='#f5c842'; ctx.font='9px "Press Start 2P",monospace';
      ctx.fillText('РЕКОРД: '+best,W/2,H/2+34);
      ctx.fillStyle='rgba(200,200,220,0.5)'; ctx.font='7px "Press Start 2P",monospace';
      if(deathLockTimer > 0){
        const secs = Math.ceil(deathLockTimer / 60);
        ctx.fillStyle='rgba(180,160,220,0.55)'; ctx.font='7px "Press Start 2P",monospace';
        ctx.fillText('ПРОДОЛЖИТЬ ЧЕРЕЗ '+secs+'...', W/2, H/2+60);
      } else {
        ctx.fillStyle='rgba(200,200,220,0.65)'; ctx.font='7px "Press Start 2P",monospace';
        ctx.fillText('НАЖМИ ДЛЯ РЕСТАРТА', W/2, H/2+60);
      }
    }
    if(state==='victory'){
      ctx.fillStyle='rgba(0,0,0,0.78)';
      roundRect(W/2-148,H/2-100,296,200,[18,18,18,18]); ctx.fill();
      ctx.strokeStyle='rgba(255,215,0,0.55)'; ctx.lineWidth=2;
      roundRect(W/2-148,H/2-100,296,200,[18,18,18,18]); ctx.stroke();

      // Мерцающий золотой заголовок
      const pulse=0.85+0.15*Math.sin(globalT*0.12);
      ctx.save();
      ctx.globalAlpha=pulse;
      ctx.fillStyle='#ffd700'; ctx.font='bold 13px "Press Start 2P",monospace'; ctx.textAlign='center';
      ctx.shadowColor='#ff8800'; ctx.shadowBlur=20;
      ctx.fillText('🏆 ПОБЕДА! 🏆',W/2,H/2-66);
      ctx.restore();

      ctx.fillStyle='#e8e8f0'; ctx.font='8px "Press Start 2P",monospace'; ctx.textAlign='center';
      ctx.fillText('Дракон вырвался на свободу!',W/2,H/2-38);

      ctx.fillStyle='#88ffaa'; ctx.font='10px "Press Start 2P",monospace';
      ctx.fillText('СЧЁТ: '+score,W/2,H/2-12);
      ctx.fillStyle='#f5c842'; ctx.font='9px "Press Start 2P",monospace';
      ctx.fillText('РЕКОРД: '+best,W/2,H/2+12);

      // Разделитель
      ctx.fillStyle='rgba(255,215,0,0.2)';
      ctx.fillRect(W/2-100,H/2+26,200,1);

      // Новый вызов
      const nextWin = winScoreForLevel(currentLevel+1);
      const challengePulse = 0.7+0.3*Math.sin(globalT*0.09);
      ctx.save();
      ctx.globalAlpha=challengePulse;
      ctx.fillStyle='#a0e8ff'; ctx.font='bold 8px "Press Start 2P",monospace'; ctx.textAlign='center';
      ctx.shadowColor='#40aaff'; ctx.shadowBlur=12;
      ctx.fillText('ХОЧЕШЬ ПОПРОБОВАТЬ',W/2,H/2+46);
      ctx.fillText('НОВЫЙ ВЫЗОВ?',W/2,H/2+62);
      ctx.restore();
      ctx.fillStyle='rgba(180,220,255,0.55)'; ctx.font='7px "Press Start 2P",monospace';
      ctx.fillText('ЦЕЛЬ: '+nextWin+' ОЧКОВ',W/2,H/2+78);

      ctx.fillStyle='rgba(200,200,220,0.45)'; ctx.font='7px "Press Start 2P",monospace';
      ctx.fillText('НАЖМИ ДЛЯ ПРОДОЛЖЕНИЯ',W/2,H/2+96);
    }
  }

  // ── UPDATE ─────────────────────────────────────────────────
  function update(){
    globalT++;
    wingFlap+=0.12;

    if(milestoneAlpha>0) milestoneAlpha=Math.max(0,milestoneAlpha-0.012);
    if(deathLockTimer>0) deathLockTimer--;

    if(narrativeTimer>0){ narrativeTimer--; }
    else if(narrativeAlpha>0){ narrativeAlpha=Math.max(0,narrativeAlpha-0.015); }
    else if(narrativeIdx<NARRATIVE_LINES.length-1){ narrativeIdx++; narrativeAlpha=1; narrativeTimer=160; }

    const season=seasonIdx(globalT);
    if(season!==lastSeason){ initParticles(season); lastSeason=season; }
    for(let p of particles){ p.x+=p.vx; p.y+=p.vy; p.angle+=p.rot; if(p.y>H-GROUND_H){p.y=0;p.x=Math.random()*W;} }

    fireParticles=fireParticles.filter(p=>p.life>0.05);
    for(let p of fireParticles){p.x+=p.vx;p.y+=p.vy;p.life-=0.07;}

    // ── ФИНАЛЬНАЯ АНИМАЦИЯ ────────────────────────────────────
    if(state==='finale'){
      finaleT++;
      frames++;

      // Двигаем оставшиеся трубы
      for(let p of pipes) p.x -= currentDiff.speed;
      pipes=pipes.filter(p=>p.x+PIPE_W>-10);

      if(finaleState==='approach'){
        // Ждём пока дракон пройдёт финальную трубу, тогда переходим в burst
        bird.vy += bird.vy < -PEAK_ZONE ? GRAV_UP : Math.abs(bird.vy) <= PEAK_ZONE ? GRAV_PEAK : GRAV_DOWN;
        bird.vy = Math.min(bird.vy, MAX_FALL);
        bird.y += bird.vy;
        const targetAngle=Math.min(Math.max(bird.vy*0.055,-0.40),1.05);
        bird.angle+=(targetAngle-bird.angle)*ANGLE_SPEED;

        if(finalePipe && finalePipe.x+PIPE_W < DRAGON_X-12){
          finaleState='burst';
          finaleT=0;
          finaleFlash=1.0;
          triggerShake(4,20);
          spawnFireAt(DRAGON_X+30, bird.y, 20);
          dragonFlyX=DRAGON_X; dragonFlyY=bird.y; dragonFlyAngle=bird.angle;
          sndFinaleBurst();
          setWindVolume(0.15, 0.5);
        }
        // Продолжаем прыгать по input
        if(bird.vy<3){ coyoteTimer=COYOTE_FRAMES; } else if(coyoteTimer>0){ coyoteTimer--; }
        if(jumpBuffer>0) jumpBuffer--;
        tryJump();
      }

      if(finaleState==='burst'){
        // 60 кадров вспышки, потом fly
        dragonFlyY += (H/2-30 - dragonFlyY) * 0.04; // выравниваем к центру
        dragonFlyAngle += (-0.3 - dragonFlyAngle)*0.08; // нос вверх
        spawnFireAt(dragonFlyX+30, dragonFlyY, 2);
        if(finaleT>=60){
          finaleState='fly'; finaleT=0;
        }
      }

      if(finaleState==='fly'){
        // Дракон ускоряется вправо и улетает за экран
        dragonFlyX += 3 + finaleT * 0.08;
        dragonFlyY -= 0.8; // чуть поднимается
        dragonFlyAngle += (-0.4 - dragonFlyAngle)*0.05;
        if(finaleT%4===0) spawnFireAt(dragonFlyX, dragonFlyY, 1);
        wingFlap+=0.2; // машет крыльями быстрее

        if(dragonFlyX > W+100){
          finaleState='done'; state='victory';
          setWindVolume(0, 1.5);
          sndVictory();
        }
      }
      return;
    }

    if(state==='playing'){
      let grav;
      if(bird.vy < -PEAK_ZONE){ grav=GRAV_UP; }
      else if(Math.abs(bird.vy) <= PEAK_ZONE){ grav=GRAV_PEAK; }
      else { grav=GRAV_DOWN; }
      bird.vy+=grav; bird.vy=Math.min(bird.vy,MAX_FALL); bird.y+=bird.vy;

      if(bird.vy<3){ coyoteTimer=COYOTE_FRAMES; } else if(coyoteTimer>0){ coyoteTimer--; }
      if(jumpBuffer>0) jumpBuffer--;
      tryJump();

      const targetAngle=Math.min(Math.max(bird.vy*0.055,-0.40),1.05);
      bird.angle+=(targetAngle-bird.angle)*ANGLE_SPEED;
      frames++;
      if(frames%currentDiff.interval===0) addPipe();

      for(let p of pipes){
        p.x-=currentDiff.speed;
        if(!p.scored&&p.x+PIPE_W<DRAGON_X-12){
          p.scored=true; score++; scoreEl.textContent=score;
          if(score>best){best=score;bestEl.textContent=best;localStorage.setItem('fb_best_dragon3',best);}
          sndScore(score);
          if(MILESTONES[score]){milestoneText=MILESTONES[score];milestoneAlpha=1;sndMilestone(score);}

          // ── ФИНАЛ: дракон достиг 29 очков, следующая труба — финальная ──
          if(score===WIN_SCORE-1){
            finaleState='approach';
            // addPipe уже поставит финальную трубу через isFinal флаг
          }

          // ── ФИНАЛ: дракон прошёл финальную трубу (30-ю) ──
          if(score===WIN_SCORE){
            state='finale';
            finaleState='approach'; // переходим в режим финала
            finaleT=0;
            // Дополнительный сброс труб кроме последней
            pipes=pipes.filter(p=>p.isFinal||p.x>DRAGON_X);
            return;
          }
        }
      }
      pipes=pipes.filter(p=>p.x+PIPE_W>-10);

      if(bird.y+12>H-GROUND_H||bird.y-12<0){
        sndDeath(); setWindVolume(0, 0.4);
        state='dead'; deathLockTimer=180; triggerShake(7,18); return;
      }
      for(let p of pipes){
        if(DRAGON_X+12>p.x&&DRAGON_X-12<p.x+PIPE_W){
          if(bird.y-10<p.top||bird.y+10>p.top+currentDiff.gap){
            sndDeath(); setWindVolume(0, 0.4);
            state='dead'; deathLockTimer=180; triggerShake(7,18); return;
          }
        }
      }
    }

    if(state==='idle'){
      bird.y=H/2-30+Math.sin(frames*0.04)*10;
      bird.angle=Math.sin(frames*0.04)*0.2;
      frames++;
    }
  }

  // ── RENDER ─────────────────────────────────────────────────
  function render(){
    ctx.clearRect(0,0,W,H);
    let sx=0,sy=0;
    if(shakeFrames>0){
      sx=(Math.random()-0.5)*shakeMag;
      sy=(Math.random()-0.5)*shakeMag;
      shakeMag*=0.85; shakeFrames--;
    }
    ctx.save();
    ctx.translate(sx,sy);
    drawSky();
    drawStars();
    drawCelestial();
    drawParallax();
    drawParticles();
    for(let p of pipes) drawPipe(p);
    drawGround();
    drawFireParticles();

    // В finale дракон летит по отдельным координатам
    if(state==='finale' && (finaleState==='burst'||finaleState==='fly')){
      drawDragon(dragonFlyY, dragonFlyAngle, dragonFlyX);
    } else if(state!=='victory'){
      drawDragon(bird.y,bird.angle);
    }

    drawFinale();
    drawNarrative();
    drawMilestone();
    drawUI();
    ctx.restore();
  }

  // ── LOOP ───────────────────────────────────────────────────
  function loop(){ update(); render(); requestAnimationFrame(loop); }
  initStars();
  initParticles(0);
  initBgLayers();
  init();
  loop();
})();
</script>
