<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚔️ BLAZE vs FROST — Browser Fighting</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
    font-family: 'Segoe UI', Arial, sans-serif;
  }
  #gameContainer {
    position: relative;
    border: 3px solid #333;
    border-radius: 8px;
    box-shadow: 0 0 60px rgba(255,100,0,0.3), 0 0 60px rgba(0,100,255,0.3);
  }
  canvas { display: block; border-radius: 5px; }
  #overlay {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    display: flex; flex-direction: column; justify-content: center; align-items: center;
    pointer-events: none; z-index: 10;
  }
  #overlay.active { pointer-events: all; }
  #overlay h1 {
    font-size: 72px; color: #fff; text-shadow: 0 0 30px #ff4400, 0 0 60px #ff0000;
    letter-spacing: 4px; animation: pulse 1s infinite;
  }
  #overlay h2 {
    font-size: 48px; color: #ffcc00; text-shadow: 0 0 20px #ff8800;
    margin-top: 10px;
  }
  #overlay p { font-size: 20px; color: #ccc; margin-top: 20px; }
  #restartBtn {
    margin-top: 30px; padding: 15px 50px; font-size: 22px;
    background: linear-gradient(135deg, #ff4400, #ff8800);
    color: #fff; border: none; border-radius: 10px; cursor: pointer;
    text-transform: uppercase; font-weight: bold; letter-spacing: 2px;
    transition: transform 0.2s, box-shadow 0.2s;
    box-shadow: 0 0 20px rgba(255,68,0,0.5);
  }
  #restartBtn:hover { transform: scale(1.1); box-shadow: 0 0 40px rgba(255,68,0,0.8); }
  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.05); }
  }
  #controls {
    position: absolute; bottom: -40px; left: 0; width: 100%;
    text-align: center; color: #666; font-size: 13px;
  }
</style>
</head>
<body>

<div id="gameContainer">
  <canvas id="gameCanvas"></canvas>
  <div id="overlay" class="active">
    <h1>⚔️ FIGHT!</h1>
    <p>WASD — движение | J — лёгкий | K — средний | L — тяжёлый | S — блок</p>
    <p style="color:#ff8800;">Комбо: J → K → L = 🔥 ОГНЕННЫЙ ВЗРЫВ!</p>
    <button id="restartBtn" onclick="startGame()">НАЧАТЬ БОЙ</button>
  </div>
  <div id="controls">BLAZE vs FROST — Browser Fighting Game © 2026</div>
</div>

<script>
// ============================================================
//  НАСТРОЙКИ
// ============================================================
const W = 1000, H = 560;
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
canvas.width = W; canvas.height = H;

const GROUND_Y = H - 80;
const GRAVITY = 0.65;
const ROUND_TIME = 600;

// ============================================================
//  WEB AUDIO — ЗВУКИ
// ============================================================
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function playSound(type) {
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  const t = audioCtx.currentTime;

  switch(type) {
    case 'light':
      osc.type = 'square'; osc.frequency.setValueAtTime(600, t);
      osc.frequency.exponentialRampToValueAtTime(200, t + 0.08);
      gain.gain.setValueAtTime(0.15, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.1);
      osc.start(t); osc.stop(t + 0.1);
      break;
    case 'medium':
      osc.type = 'sawtooth'; osc.frequency.setValueAtTime(400, t);
      osc.frequency.exponentialRampToValueAtTime(100, t + 0.15);
      gain.gain.setValueAtTime(0.2, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.18);
      osc.start(t); osc.stop(t + 0.18);
      break;
    case 'heavy':
      osc.type = 'sawtooth'; osc.frequency.setValueAtTime(200, t);
      osc.frequency.exponentialRampToValueAtTime(50, t + 0.3);
      gain.gain.setValueAtTime(0.3, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.35);
      osc.start(t); osc.stop(t + 0.35);
      // добавим "бас"
      const osc2 = audioCtx.createOscillator();
      const gain2 = audioCtx.createGain();
      osc2.connect(gain2); gain2.connect(audioCtx.destination);
      osc2.type = 'sine'; osc2.frequency.setValueAtTime(80, t);
      osc2.frequency.exponentialRampToValueAtTime(30, t + 0.4);
      gain2.gain.setValueAtTime(0.4, t);
      gain2.gain.exponentialRampToValueAtTime(0.001, t + 0.4);
      osc2.start(t); osc2.stop(t + 0.4);
      break;
    case 'combo':
      [800, 1000, 1200].forEach((f, i) => {
        const o = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        o.connect(g); g.connect(audioCtx.destination);
        o.type = 'square'; o.frequency.value = f;
        g.gain.setValueAtTime(0.15, t + i * 0.08);
        g.gain.exponentialRampToValueAtTime(0.001, t + i * 0.08 + 0.15);
        o.start(t + i * 0.08); o.stop(t + i * 0.08 + 0.15);
      });
      break;
    case 'block':
      osc.type = 'sine'; osc.frequency.setValueAtTime(300, t);
      osc.frequency.exponentialRampToValueAtTime(150, t + 0.1);
      gain.gain.setValueAtTime(0.1, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.12);
      osc.start(t); osc.stop(t + 0.12);
      break;
    case 'ko':
      [200, 150, 100, 80].forEach((f, i) => {
        const o = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        o.connect(g); g.connect(audioCtx.destination);
        o.type = 'sawtooth'; o.frequency.value = f;
        g.gain.setValueAtTime(0.3, t + i * 0.2);
        g.gain.exponentialRampToValueAtTime(0.001, t + i * 0.2 + 0.3);
        o.start(t + i * 0.2); o.stop(t + i * 0.2 + 0.3);
      });
      break;
  }
}

// ============================================================
//  ЧАСТИЦЫ
// ============================================================
let particles = [];

function spawnParticles(x, y, color, count, speed, size) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const spd = Math.random() * speed + 1;
    particles.push({
      x, y,
      vx: Math.cos(angle) * spd,
      vy: Math.sin(angle) * spd - 2,
      life: 1,
      decay: Math.random() * 0.03 + 0.02,
      size: Math.random() * size + 2,
      color
    });
  }
}

function updateParticles() {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.15;
    p.life -= p.decay;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

function drawParticles() {
  particles.forEach(p => {
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;
}

// ============================================================
//  ТРЯСКА ЭКРАНА
// ============================================================
let screenShake = { x: 0, y: 0, intensity: 0, decay: 0.9 };

function shake(intensity) {
  screenShake.intensity = intensity;
}

function updateShake() {
  if (screenShake.intensity > 0.5) {
    screenShake.x = (Math.random() - 0.5) * screenShake.intensity;
    screenShake.y = (Math.random() - 0.5) * screenShake.intensity;
    screenShake.intensity *= screenShake.decay;
  } else {
    screenShake.x = 0; screenShake.y = 0; screenShake.intensity = 0;
  }
}

// ============================================================
//  КЛАСС ПЕРСОНАЖА
// ============================================================
class Fighter {
  constructor(name, x, facing, colors, isBot) {
    this.name = name;
    this.x = x;
    this.y = GROUND_Y;
    this.vx = 0;
    this.vy = 0;
    this.facing = facing; // 1 = right, -1 = left
    this.colors = colors;
    this.isBot = isBot;

    this.maxHP = 100;
    this.hp = 100;
    this.displayHP = 100; // для плавной анимации HP бара

    this.state = 'idle'; // idle, walk, jump, attack, hit, block, ko
    this.attackType = null; // light, medium, heavy
    this.attackFrame = 0;
    this.attackDuration = 0;
    this.attackHit = false;

    this.hitStun = 0;
    this.blockStun = 0;

    this.comboCount = 0;
    this.comboTimer = 0;
    this.comboSequence = [];

    this.width = 50;
    this.height = 100;

    this.animFrame = 0;
    this.animTimer = 0;

    // Bot AI
    this.aiTimer = 0;
    this.aiAction = 'idle';
    this.aiReactionTime = 0.3 + Math.random() * 0.3;
    this.aiAggression = 0.6;
  }

  get hitbox() {
    return {
      x: this.x - this.width / 2,
      y: this.y - this.height,
      w: this.width,
      h: this.height
    };
  }

  getAttackBox() {
    if (this.state !== 'attack' || !this.attackType) return null;
    const reach = { light: 55, medium: 70, heavy: 85 };
    const h = { light: 20, medium: 30, heavy: 45 };
    const yOffset = { light: -60, medium: -50, heavy: -40 };
    const progress = this.attackFrame / this.attackDuration;
    // Hitbox активен только в середине анимации
    if (progress < 0.25 || progress > 0.6) return null;

    return {
      x: this.facing === 1 ? this.x + 15 : this.x - 15 - reach[this.attackType],
      y: this.y + yOffset[this.attackType],
      w: reach[this.attackType],
      h: h[this.attackType]
    };
  }

  getDamage() {
    if (!this.attackType) return 0;
    const dmg = { light: 5, medium: 9, heavy: 15 };
    return dmg[this.attackType];
  }

  startAttack(type) {
    if (this.state === 'attack' || this.state === 'hit' || this.state === 'ko') return;
    this.state = 'attack';
    this.attackType = type;
    this.attackFrame = 0;
    this.attackHit = false;
    const dur = { light: 15, medium: 22, heavy: 30 };
    this.attackDuration = dur[type];

    // Combo tracking
    if (type === 'light') {
      this.comboSequence = ['light'];
      this.comboTimer = 45;
    } else if (type === 'medium' && this.comboSequence.length === 1 && this.comboSequence[0] === 'light') {
      this.comboSequence.push('medium');
      this.comboTimer = 45;
    } else if (type === 'heavy' && this.comboSequence.length === 2) {
      this.comboSequence.push('heavy');
      this.comboTimer = 45;
      this.comboCount = 3;
      playSound('combo');
      shake(15);
      // Комбо-эффект
      spawnParticles(this.x + this.facing * 40, this.y - 50, '#ffcc00', 30, 8, 5);
      spawnParticles(this.x + this.facing * 40, this.y - 50, '#ff4400', 20, 6, 4);
    } else {
      this.comboSequence = [type];
      this.comboTimer = 45;
    }

    playSound(type);
  }

  takeDamage(dmg, attackerX, isCombo) {
    if (this.state === 'ko') return;

    let actualDmg = dmg;
    let blocked = false;

    if (this.state === 'block') {
      actualDmg = Math.floor(dmg * 0.3);
      blocked = true;
      this.blockStun = 10;
      playSound('block');
      spawnParticles(this.x, this.y - 50, '#88ccff', 8, 3, 3);
      shake(3);
    } else {
      this.state = 'hit';
      this.hitStun = isCombo ? 20 : (dmg > 10 ? 18 : 12);
      this.vx = (this.x > attackerX ? 1 : -1) * (isCombo ? 8 : (dmg > 10 ? 5 : 3));
      this.vy = isCombo ? -6 : (dmg > 10 ? -4 : -1);

      const colors = this.colors.primary === '#ff4444' ? ['#ff4444','#ff8800','#ffcc00'] : ['#4488ff','#44ccff','#88ddff'];
      spawnParticles(this.x, this.y - 50, colors[0], 12, 5, 4);
      spawnParticles(this.x, this.y - 50, '#ffffff', 5, 3, 2);
      shake(isCombo ? 12 : (dmg > 10 ? 8 : 4));
    }

    this.hp = Math.max(0, this.hp - actualDmg);

    if (this.hp <= 0) {
      this.state = 'ko';
      this.vy = -10;
      this.vx = (this.x > attackerX ? 1 : -1) * 6;
      playSound('ko');
      shake(20);
      spawnParticles(this.x, this.y - 50, '#ffcc00', 40, 10, 6);
    }
  }

  update(keys, opponent) {
    // Anim timer
    this.animTimer++;
    if (this.animTimer > 8) { this.animTimer = 0; this.animFrame++; }

    // Combo timer
    if (this.comboTimer > 0) this.comboTimer--;
    if (this.comboTimer <= 0) { this.comboSequence = []; }

    // Smooth HP display
    this.displayHP += (this.hp - this.displayHP) * 0.1;

    // KO state
    if (this.state === 'ko') {
      this.vy += GRAVITY;
      this.y += this.vy;
      this.x += this.vx;
      this.vx *= 0.95;
      if (this.y >= GROUND_Y) { this.y = GROUND_Y; this.vy = 0; this.vx = 0; }
      this.x = Math.max(30, Math.min(W - 30, this.x));
      return;
    }

    // Hit stun
    if (this.hitStun > 0) {
      this.hitStun--;
      this.vy += GRAVITY;
      this.y += this.vy;
      this.x += this.vx;
      this.vx *= 0.9;
      if (this.y >= GROUND_Y) { this.y = GROUND_Y; this.vy = 0; }
      this.x = Math.max(30, Math.min(W - 30, this.x));
      if (this.hitStun <= 0 && this.hp > 0) this.state = 'idle';
      return;
    }

    // Block stun
    if (this.blockStun > 0) {
      this.blockStun--;
      return;
    }

    // Attack
    if (this.state === 'attack') {
      this.attackFrame++;

      // Check hit
      if (!this.attackHit) {
        const atkBox = this.getAttackBox();
        if (atkBox) {
          const oppHB = opponent.hitbox;
          if (atkBox.x < oppHB.x + oppHB.w && atkBox.x + atkBox.w > oppHB.x &&
              atkBox.y < oppHB.y + oppHB.h && atkBox.y + atkBox.h > oppHB.y) {
            this.attackHit = true;
            const isCombo = this.comboCount >= 3;
            let dmg = this.getDamage();
            if (isCombo) dmg = Math.floor(dmg * 2.5);
            opponent.takeDamage(dmg, this.x, isCombo);
          }
        }
      }

      if (this.attackFrame >= this.attackDuration) {
        this.state = 'idle';
        this.attackType = null;
      }
      this.vy += GRAVITY;
      this.y += this.vy;
      if (this.y >= GROUND_Y) { this.y = GROUND_Y; this.vy = 0; }
      this.x = Math.max(30, Math.min(W - 30, this.x));
      return;
    }

    // Bot AI
    if (this.isBot) {
      this.updateAI(opponent);
    } else {
      this.updatePlayer(keys, opponent);
    }

    // Physics
    this.vy += GRAVITY;
    this.y += this.vy;
    this.x += this.vx;
    this.vx *= 0.85;

    if (this.y >= GROUND_Y) { this.y = GROUND_Y; this.vy = 0; }
    this.x = Math.max(30, Math.min(W - 30, this.x));

    // Face opponent
    if (this.state !== 'attack' && this.state !== 'hit') {
      this.facing = opponent.x > this.x ? 1 : -1;
    }
  }

  updatePlayer(keys, opponent) {
    // Block
    if (keys['s'] || keys['S'] || keys['ы'] || keys['Ы']) {
      if (this.y >= GROUND_Y - 2) {
        this.state = 'block';
        this.vx = 0;
        return;
      }
    }
    if (this.state === 'block') this.state = 'idle';

    // Attack
    if (keys['j'] || keys['J'] || keys['о'] || keys['О']) { this.startAttack('light'); keys['j']=false; keys['J']=false; keys['о']=false; keys['О']=false; return; }
    if (keys['k'] || keys['K'] || keys['л'] || keys['Л']) { this.startAttack('medium'); keys['k']=false; keys['K']=false; keys['л']=false; keys['Л']=false; return; }
    if (keys['l'] || keys['L'] || keys['д'] || keys['Д']) { this.startAttack('heavy'); keys['l']=false; keys['L']=false; keys['д']=false; keys['Д']=false; return; }

    // Movement
    const speed = 4.5;
    if (keys['a'] || keys['A'] || keys['ф'] || keys['Ф']) { this.vx = -speed; this.state = 'walk'; }
    else if (keys['d'] || keys['D'] || keys['в'] || keys['В']) { this.vx = speed; this.state = 'walk'; }
    else { if (this.state === 'walk') this.state = 'idle'; }

    // Jump
    if ((keys['w'] || keys['W'] || keys['ц'] || keys['Ц']) && this.y >= GROUND_Y - 2) {
      this.vy = -13;
      this.state = 'jump';
    }
    if (this.state === 'jump' && this.y >= GROUND_Y - 2) this.state = 'idle';
  }

  updateAI(opponent) {
    this.aiTimer--;
    if (this.aiTimer > 0) {
      this.executeAI(opponent);
      return;
    }

    // Decide new action
    const dist = Math.abs(this.x - opponent.x);
    const rand = Math.random();

    if (opponent.state === 'attack' && dist < 120) {
      // React to attack
      if (rand < 0.5) {
        this.aiAction = 'block';
        this.aiTimer = 20 + Math.random() * 20;
      } else {
        this.aiAction = 'retreat';
        this.aiTimer = 15 + Math.random() * 15;
      }
    } else if (dist > 200) {
      this.aiAction = 'approach';
      this.aiTimer = 20 + Math.random() * 30;
    } else if (dist < 90) {
      if (rand < this.aiAggression) {
        const atkRand = Math.random();
        if (atkRand < 0.4) this.aiAction = 'attack_light';
        else if (atkRand < 0.7) this.aiAction = 'attack_medium';
        else if (atkRand < 0.85) this.aiAction = 'attack_heavy';
        else this.aiAction = 'combo';
        this.aiTimer = 10 + Math.random() * 15;
      } else {
        this.aiAction = 'block';
        this.aiTimer = 15 + Math.random() * 20;
      }
    } else {
      if (rand < 0.6) {
        this.aiAction = 'approach';
        this.aiTimer = 15 + Math.random() * 20;
      } else if (rand < 0.8) {
        this.aiAction = 'jump_attack';
        this.aiTimer = 25;
      } else {
        this.aiAction = 'idle';
        this.aiTimer = 10 + Math.random() * 20;
      }
    }

    this.executeAI(opponent);
  }

  executeAI(opponent) {
    if (this.state === 'attack') return;

    const dist = Math.abs(this.x - opponent.x);
    const speed = 4;

    switch(this.aiAction) {
      case 'approach':
        this.vx = (opponent.x > this.x ? 1 : -1) * speed;
        this.state = 'walk';
        break;
      case 'retreat':
        this.vx = (opponent.x > this.x ? -1 : 1) * speed;
        this.state = 'walk';
        break;
      case 'block':
        if (this.y >= GROUND_Y - 2) this.state = 'block';
        break;
      case 'attack_light':
        if (dist < 100) this.startAttack('light');
        else { this.vx = (opponent.x > this.x ? 1 : -1) * speed; this.state = 'walk'; }
        break;
      case 'attack_medium':
        if (dist < 110) this.startAttack('medium');
        else { this.vx = (opponent.x > this.x ? 1 : -1) * speed; this.state = 'walk'; }
        break;
      case 'attack_heavy':
        if (dist < 120) this.startAttack('heavy');
        else { this.vx = (opponent.x > this.x ? 1 : -1) * speed; this.state = 'walk'; }
        break;
      case 'combo':
        if (dist < 100) {
          if (this.comboSequence.length === 0) this.startAttack('light');
          else if (this.comboSequence.length === 1) this.startAttack('medium');
          else if (this.comboSequence.length === 2) this.startAttack('heavy');
        } else { this.vx = (opponent.x > this.x ? 1 : -1) * speed; this.state = 'walk'; }
        break;
      case 'jump_attack':
        if (this.y >= GROUND_Y - 2) {
          this.vy = -13;
          this.vx = (opponent.x > this.x ? 1 : -1) * 3;
          this.state = 'jump';
          setTimeout(() => {
            if (this.state === 'jump' && this.hp > 0) this.startAttack('medium');
          }, 200);
        }
        break;
      default:
        this.state = 'idle';
    }

    if (this.state === 'block' && this.aiAction !== 'block') {
      this.state = 'idle';
    }
  }

  draw() {
    ctx.save();
    ctx.translate(screenShake.x, screenShake.y);

    const x = this.x;
    const y = this.y;
    const f = this.facing;
    const c = this.colors;

    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.beginPath();
    ctx.ellipse(x, GROUND_Y + 5, 30, 8, 0, 0, Math.PI * 2);
    ctx.fill();

    ctx.save();
    ctx.translate(x, y);
    ctx.scale(f, 1);

    // Hit flash
    let flash = false;
    if (this.state === 'hit' && this.hitStun % 4 < 2) flash = true;

    // KO rotation
    if (this.state === 'ko') {
      ctx.rotate(Math.min(this.animTimer * 0.02, Math.PI / 2) * (f === 1 ? 1 : -1));
    }

    const bodyColor = flash ? '#ffffff' : c.primary;
    const darkColor = flash ? '#cccccc' : c.dark;
    const lightColor = flash ? '#eeeeee' : c.light;

    // === BODY ===
    // Legs
    let legSpread = 0;
    let legBend = 0;
    let bodyBob = 0;

    if (this.state === 'idle') {
      bodyBob = Math.sin(this.animFrame * 0.5) * 2;
      legSpread = 8;
    } else if (this.state === 'walk') {
      legSpread = Math.sin(this.animFrame * 1.2) * 15;
      bodyBob = Math.abs(Math.sin(this.animFrame * 1.2)) * 3;
    } else if (this.state === 'jump') {
      legBend = -10;
      legSpread = 5;
    } else if (this.state === 'block') {
      legSpread = 12;
      bodyBob = -3;
    }

    // Left leg
    ctx.fillStyle = darkColor;
    ctx.fillRect(-12 - legSpread, -35 + bodyBob, 12, 35 - bodyBob + legBend);
    // Right leg
    ctx.fillRect(0 + legSpread, -35 + bodyBob, 12, 35 - bodyBob + legBend);

    // Feet
    ctx.fillStyle = '#333';
    ctx.fillRect(-14 - legSpread, -2 + bodyBob + legBend, 16, 5);
    ctx.fillRect(-2 + legSpread, -2 + bodyBob + legBend, 16, 5);

    // Torso
    ctx.fillStyle = bodyColor;
    ctx.fillRect(-18, -75 + bodyBob, 36, 42);

    // Belt
    ctx.fillStyle = '#222';
    ctx.fillRect(-18, -38 + bodyBob, 36, 6);

    // Chest detail
    ctx.fillStyle = lightColor;
    ctx.fillRect(-14, -70 + bodyBob, 28, 8);

    // Arms
    let armAngle = 0;
    let armExtend = 0;

    if (this.state === 'attack') {
      const progress = this.attackFrame / this.attackDuration;
      if (progress < 0.3) {
        armExtend = progress / 0.3 * 40;
      } else if (progress < 0.6) {
        armExtend = 40;
      } else {
        armExtend = 40 * (1 - (progress - 0.6) / 0.4);
      }

      if (this.attackType === 'heavy') armExtend *= 1.3;
    }

    if (this.state === 'block') {
      // Blocking pose
      ctx.fillStyle = darkColor;
      ctx.fillRect(-5, -70 + bodyBob, 14, 30);
      ctx.fillRect(-20, -70 + bodyBob, 14, 30);
      // Shield effect
      ctx.strokeStyle = 'rgba(100,200,255,0.5)';
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.arc(0, -55 + bodyBob, 35, -Math.PI * 0.6, Math.PI * 0.6);
      ctx.stroke();
    } else {
      // Back arm
      ctx.fillStyle = darkColor;
      ctx.fillRect(-22, -72 + bodyBob, 10, 28);

      // Front arm (attacking arm)
      ctx.fillStyle = bodyColor;
      if (this.state === 'attack') {
        ctx.fillRect(12, -72 + bodyBob, 10 + armExtend, 10);
        // Fist
        ctx.fillStyle = lightColor;
        ctx.fillRect(20 + armExtend, -75 + bodyBob, 14, 16);

        // Attack effect
        if (this.attackFrame / this.attackDuration > 0.2 && this.attackFrame / this.attackDuration < 0.6) {
          const effectColors = { light: '#ffcc00', medium: '#ff8800', heavy: '#ff2200' };
          ctx.fillStyle = effectColors[this.attackType] || '#ffcc00';
          ctx.globalAlpha = 0.6;
          ctx.beginPath();
          ctx.arc(30 + armExtend, -67 + bodyBob, this.attackType === 'heavy' ? 20 : 12, 0, Math.PI * 2);
          ctx.fill();
          ctx.globalAlpha = 1;
        }
      } else {
        ctx.fillRect(12, -72 + bodyBob, 10, 28);
        ctx.fillStyle = lightColor;
        ctx.fillRect(12, -48 + bodyBob, 10, 8);
      }
    }

    // Head
    ctx.fillStyle = lightColor;
    ctx.beginPath();
    ctx.arc(0, -85 + bodyBob, 16, 0, Math.PI * 2);
    ctx.fill();

    // Hair / Helmet
    ctx.fillStyle = c.hair;
    ctx.beginPath();
    ctx.arc(0, -90 + bodyBob, 16, Math.PI, Math.PI * 2);
    ctx.fill();
    ctx.fillRect(-16, -92 + bodyBob, 32, 6);

    // Eyes
    ctx.fillStyle = '#fff';
    ctx.fillRect(4, -88 + bodyBob, 8, 5);
    ctx.fillStyle = this.state === 'ko' ? '#666' : c.eyes;
    ctx.fillRect(7, -87 + bodyBob, 4, 4);

    // Mouth
    if (this.state === 'hit' || this.state === 'attack') {
      ctx.fillStyle = '#333';
      ctx.fillRect(3, -79 + bodyBob, 8, 3);
    }

    // Character-specific details
    if (c.primary === '#ff4444') {
      // BLAZE — fire effects
      if (this.state === 'idle' || this.state === 'walk') {
        ctx.globalAlpha = 0.4 + Math.sin(Date.now() * 0.01) * 0.2;
        ctx.fillStyle = '#ff8800';
        ctx.beginPath();
        ctx.arc(-5, -95 + bodyBob + Math.sin(Date.now() * 0.005) * 3, 5, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(8, -92 + bodyBob + Math.cos(Date.now() * 0.007) * 2, 4, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 1;
      }
    } else {
      // FROST — ice effects
      if (this.state === 'idle' || this.state === 'walk') {
        ctx.globalAlpha = 0.3 + Math.sin(Date.now() * 0.008) * 0.15;
        ctx.fillStyle = '#aaddff';
        for (let i = 0; i < 3; i++) {
          const ix = -10 + i * 10;
          const iy = -95 + bodyBob + Math.sin(Date.now() * 0.003 + i) * 4;
          ctx.fillRect(ix, iy, 3, 3);
        }
        ctx.globalAlpha = 1;
      }
    }

    ctx.restore();

    // Combo display
    if (this.comboCount >= 3 && this.comboTimer > 0) {
      ctx.save();
      ctx.font = 'bold 28px Arial';
      ctx.fillStyle = '#ffcc00';
      ctx.textAlign = 'center';
      ctx.shadowColor = '#ff4400';
      ctx.shadowBlur = 15;
      ctx.fillText('🔥 COMBO x3!', this.x, this.y - 130);
      ctx.restore();
    }

    ctx.restore();
  }
}

// ============================================================
//  ФОН / АРЕНА
// ============================================================
function drawBackground() {
  // Sky gradient
  const skyGrad = ctx.createLinearGradient(0, 0, 0, H);
  skyGrad.addColorStop(0, '#1a0a2e');
  skyGrad.addColorStop(0.4, '#2d1b4e');
  skyGrad.addColorStop(0.7, '#1a1a3e');
  skyGrad.addColorStop(1, '#0a0a1e');
  ctx.fillStyle = skyGrad;
  ctx.fillRect(0, 0, W, H);

  // Stars
  const starSeed = 42;
  for (let i = 0; i < 60; i++) {
    const sx = ((i * 137 + starSeed) % W);
    const sy = ((i * 97 + starSeed * 2) % (H * 0.5));
    const brightness = 0.3 + Math.sin(Date.now() * 0.002 + i) * 0.3;
    ctx.globalAlpha = brightness;
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(sx, sy, 1 + (i % 3) * 0.5, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  // Moon
  ctx.fillStyle = '#ddeeff';
  ctx.shadowColor = '#88aaff';
  ctx.shadowBlur = 40;
  ctx.beginPath();
  ctx.arc(800, 80, 35, 0, Math.PI * 2);
  ctx.fill();
  ctx.shadowBlur = 0;

  // Mountains
  ctx.fillStyle = '#151530';
  ctx.beginPath();
  ctx.moveTo(0, GROUND_Y);
  ctx.lineTo(100, GROUND_Y - 120);
  ctx.lineTo(200, GROUND_Y - 60);
  ctx.lineTo(350, GROUND_Y - 180);
  ctx.lineTo(500, GROUND_Y - 80);
  ctx.lineTo(600, GROUND_Y - 150);
  ctx.lineTo(750, GROUND_Y - 50);
  ctx.lineTo(850, GROUND_Y - 130);
  ctx.lineTo(W, GROUND_Y - 70);
  ctx.lineTo(W, GROUND_Y);
  ctx.fill();

  // Arena floor
  const floorGrad = ctx.createLinearGradient(0, GROUND_Y, 0, H);
  floorGrad.addColorStop(0, '#2a2a3a');
  floorGrad.addColorStop(0.3, '#1e1e2e');
  floorGrad.addColorStop(1, '#0e0e1e');
  ctx.fillStyle = floorGrad;
  ctx.fillRect(0, GROUND_Y, W, H - GROUND_Y);

  // Floor line
  ctx.strokeStyle = '#444466';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(0, GROUND_Y);
  ctx.lineTo(W, GROUND_Y);
  ctx.stroke();

  // Floor tiles
  ctx.strokeStyle = 'rgba(68,68,102,0.3)';
  ctx.lineWidth = 1;
  for (let i = 0; i < W; i += 50) {
    ctx.beginPath();
    ctx.moveTo(i, GROUND_Y);
    ctx.lineTo(i, H);
    ctx.stroke();
  }
  for (let j = GROUND_Y; j < H; j += 20) {
    ctx.beginPath();
    ctx.moveTo(0, j);
    ctx.lineTo(W, j);
    ctx.stroke();
  }

  // Arena pillars
  drawPillar(50, GROUND_Y);
  drawPillar(W - 50, GROUND_Y);

  // Torches
  drawTorch(50, GROUND_Y - 100);
  drawTorch(W - 50, GROUND_Y - 100);
}

function drawPillar(x, groundY) {
  ctx.fillStyle = '#1a1a2e';
  ctx.fillRect(x - 15, groundY - 200, 30, 200);
  ctx.fillStyle = '#2a2a4e';
  ctx.fillRect(x - 20, groundY - 210, 40, 15);
  ctx.fillRect(x - 18, groundY - 5, 36, 8);
}

function drawTorch(x, y) {
  // Torch stick
  ctx.fillStyle = '#443322';
  ctx.fillRect(x - 3, y, 6, 40);

  // Fire
  const t = Date.now() * 0.01;
  ctx.globalAlpha = 0.8;
  ctx.fillStyle = '#ff4400';
  ctx.beginPath();
  ctx.arc(x, y - 5 + Math.sin(t) * 3, 10, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#ff8800';
  ctx.beginPath();
  ctx.arc(x, y - 8 + Math.sin(t + 1) * 2, 7, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#ffcc00';
  ctx.beginPath();
  ctx.arc(x, y - 10 + Math.sin(t + 2) * 2, 4, 0, Math.PI * 2);
  ctx.fill();
  ctx.globalAlpha = 1;

  // Glow
  ctx.globalAlpha = 0.1;
  ctx.fillStyle = '#ff6600';
  ctx.beginPath();
  ctx.arc(x, y, 50, 0, Math.PI * 2);
  ctx.fill();
  ctx.globalAlpha = 1;
}

// ============================================================
//  UI
// ============================================================
function drawUI(p1, p2, timer, gameState) {
  // HP Bar backgrounds
  const barW = 350, barH = 28, barY = 25;

  // P1 HP (left side, depletes right to left)
  ctx.fillStyle = '#1a1a1a';
  ctx.strokeStyle = '#555';
  ctx.lineWidth = 2;
  roundRect(30, barY, barW, barH, 5);
  ctx.fill();
  ctx.stroke();

  const p1Pct = Math.max(0, p1.displayHP / p1.maxHP);
  const p1Grad = ctx.createLinearGradient(30, 0, 30 + barW, 0);
  p1Grad.addColorStop(0, '#ff2200');
  p1Grad.addColorStop(1, '#ff8800');
  ctx.fillStyle = p1Grad;
  roundRect(32, barY + 2, (barW - 4) * p1Pct, barH - 4, 3);
  ctx.fill();

  // P2 HP (right side, depletes left to right)
  ctx.fillStyle = '#1a1a1a';
  ctx.strokeStyle = '#555';
  roundRect(W - 30 - barW, barY, barW, barH, 5);
  ctx.fill();
  ctx.stroke();

  const p2Pct = Math.max(0, p2.displayHP / p2.maxHP);
  const p2Grad = ctx.createLinearGradient(W - 30 - barW, 0, W - 30, 0);
  p2Grad.addColorStop(0, '#2244ff');
  p2Grad.addColorStop(1, '#44aaff');
  ctx.fillStyle = p2Grad;
  roundRect(W - 30 - barW + (barW - 4) * (1 - p2Pct) + 2, barY + 2, (barW - 4) * p2Pct, barH - 4, 3);
  ctx.fill();

  // Names
  ctx.font = 'bold 18px Arial';
  ctx.textAlign = 'left';
  ctx.fillStyle = '#ff8844';
  ctx.fillText('🔥 ' + p1.name, 35, barY - 5);

  ctx.textAlign = 'right';
  ctx.fillStyle = '#4488ff';
  ctx.fillText(p2.name + ' ❄️', W - 35, barY - 5);

  // HP numbers
  ctx.font = 'bold 14px Arial';
  ctx.textAlign = 'left';
  ctx.fillStyle = '#fff';
  ctx.fillText(Math.ceil(p1.hp) + '/' + p1.maxHP, 35, barY + barH + 16);

  ctx.textAlign = 'right';
  ctx.fillText(Math.ceil(p2.hp) + '/' + p2.maxHP, W - 35, barY + barH + 16);

  // Timer
  ctx.fillStyle = '#1a1a1a';
  ctx.strokeStyle = '#888';
  ctx.lineWidth = 2;
  roundRect(W / 2 - 35, 15, 70, 48, 8);
  ctx.fill();
  ctx.stroke();

  ctx.font = 'bold 32px Arial';
  ctx.textAlign = 'center';
  ctx.fillStyle = timer <= 10 ? '#ff4444' : '#fff';
  ctx.fillText(Math.ceil(timer).toString(), W / 2, 50);

  // Combo counter for player
  if (p1.comboSequence.length > 0 && p1.comboTimer > 0) {
    ctx.font = 'bold 16px Arial';
    ctx.textAlign = 'center';
    ctx.fillStyle = '#ffcc00';
    const comboText = p1.comboSequence.map(s => {
      if (s === 'light') return '👊';
      if (s === 'medium') return '🦵';
      return '💥';
    }).join(' → ');
    ctx.fillText(comboText, p1.x, p1.y - 115);
  }

  // Bot combo display
  if (p2.comboSequence.length > 0 && p2.comboTimer > 0) {
    ctx.font = 'bold 16px Arial';
    ctx.textAlign = 'center';
    ctx.fillStyle = '#88ccff';
    const comboText = p2.comboSequence.map(s => {
      if (s === 'light') return '👊';
      if (s === 'medium') return '🦵';
      return '💥';
    }).join(' → ');
    ctx.fillText(comboText, p2.x, p2.y - 115);
  }

  // Controls hint
  ctx.font = '12px Arial';
  ctx.textAlign = 'center';
  ctx.fillStyle = 'rgba(255,255,255,0.3)';
  ctx.fillText('WASD — движение | J — лёгкий | K — средний | L — тяжёлый | S — блок | J→K→L = COMBO', W / 2, H - 10);
}

function roundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

// ============================================================
//  ИГРОВОЙ ЦИКЛ
// ============================================================
let player, bot, timer, gameState, keys;

function initGame() {
  player = new Fighter('BLAZE', 250, 1, {
    primary: '#ff4444', dark: '#cc2222', light: '#ffaa88',
    hair: '#ff6600', eyes: '#ff0000'
  }, false);

  bot = new Fighter('FROST', 750, -1, {
    primary: '#4488ff', dark: '#2255cc', light: '#88bbff',
    hair: '#2244aa', eyes: '#00aaff'
  }, true);

  timer = ROUND_TIME;
  gameState = 'fight'; // fight, ko, result
  keys = {};
  particles = [];
  screenShake = { x: 0, y: 0, intensity: 0, decay: 0.9 };
}

function startGame() {
  document.getElementById('overlay').classList.remove('active');
  document.getElementById('overlay').style.display = 'none';
  initGame();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}

function showResult(winner) {
  gameState = 'result';
  const overlay = document.getElementById('overlay');
  overlay.style.display = 'flex';
  overlay.classList.add('active');

  if (winner) {
    overlay.innerHTML = `
      <h2 style="font-size:36px; color:${winner.colors.primary}">🏆 ${winner.name} ПОБЕЖДАЕТ!</h2>
      <h1 style="font-size:56px;">K.O.!</h1>
      <p>Отличный бой!</p>
      <button id="restartBtn" onclick="restartGame()">РЕВАНШ</button>
    `;
  } else {
    overlay.innerHTML = `
      <h2 style="font-size:36px; color:#ffcc00">⏰ ВРЕМЯ!</h2>
      <h1 style="font-size:48px;">НИЧЬЯ!</h1>
      <p>BLAZE: ${Math.ceil(player.hp)} HP | FROST: ${Math.ceil(bot.hp)} HP</p>
      <button id="restartBtn" onclick="restartGame()">РЕВАНШ</button>
    `;
  }
}

function restartGame() {
  document.getElementById('overlay').style.display = 'none';
  document.getElementById('overlay').classList.remove('active');
  initGame();
}

let lastTime = 0;
let timerAccum = 0;

function gameLoop(timestamp) {
  requestAnimationFrame(gameLoop);

  if (!player || gameState === 'result') {
    // Draw something when not started
    if (!player) return;
  }

  const dt = Math.min((timestamp - lastTime) / 16.67, 3); // normalize to ~60fps
  lastTime = timestamp;

  if (gameState === 'fight') {
    timerAccum += dt;
    if (timerAccum >= 1) {
      timerAccum -= 1;
      timer -= 1;
    }

    // Update
    player.update(keys, bot);
    bot.update(keys, player);
    updateParticles();
    updateShake();

    // Check KO
    if (player.hp <= 0 && player.state === 'ko' && player.y >= GROUND_Y - 2) {
      setTimeout(() => showResult(bot), 500);
      gameState = 'ko';
    }
    if (bot.hp <= 0 && bot.state === 'ko' && bot.y >= GROUND_Y - 2) {
      setTimeout(() => showResult(player), 500);
      gameState = 'ko';
    }
    if (timer <= 0) {
      if (player.hp > bot.hp) showResult(player);
      else if (bot.hp > player.hp) showResult(bot);
      else showResult(null);
    }
  } else if (gameState === 'ko') {
    player.update(keys, bot);
    bot.update(keys, bot);
    updateParticles();
    updateShake();
  }

  // Draw
  ctx.save();
  ctx.translate(screenShake.x, screenShake.y);

  drawBackground();

  // Draw fighters (back one first)
  if (player.x < bot.x) {
    player.draw();
    bot.draw();
  } else {
    bot.draw();
    player.draw();
  }

  drawParticles();

  ctx.restore();

  if (player) drawUI(player, bot, timer, gameState);
}

// ============================================================
//  ВВОД
// ============================================================
document.addEventListener('keydown', e => {
  keys[e.key] = true;
  keys[e.key.toLowerCase()] = true;
  // Prevent scrolling
  if (['w','a','s','d',' ','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key.toLowerCase())) {
    e.preventDefault();
  }
});

document.addEventListener('keyup', e => {
  keys[e.key] = false;
  keys[e.key.toLowerCase()] = false;
});

// ============================================================
//  ЗАПУСК
// ============================================================
initGame();
requestAnimationFrame(gameLoop);

</script>
